<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>禁烟劝阻取证</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }
    .camera-box {
      width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
    }
    video {
      width: 100%;
      display: block;
      object-fit: cover;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      margin: 10px 0;
      cursor: pointer;
    }
    .btn-primary { background: #007aff; color: #fff; }
    .btn-success { background: #34c759; color: white; }
    .btn-danger { background: #ff3b30; color: #fff; }
    .btn-outline { background: #fff; border: 2px solid #007aff; color: #007aff; }
    .hidden { display: none !important; }
    .status {
      background: #fff3cd;
      color: #856404;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .city-select {
      text-align: left;
      margin: 12px 0;
    }
    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
    }
    .recording-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 16px;
      height: 16px;
      background: red;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="camera-box">
      <video id="preview" autoplay playsinline muted></video>
      <div id="recIndicator" class="recording-indicator hidden"></div>
    </div>

    <div id="startSection">
      <div class="city-select">
        <select id="citySelect">
          <option value="">请选择所在城市</option>
          <option value="全国">其他城市(全国通用)</option>
          <option value="北京">北京</option>
          <option value="上海">上海</option>
          <option value="广州">广州</option>
          <option value="深圳">深圳</option>
          <option value="杭州">杭州</option>
          <option value="成都">成都</option>
          <option value="武汉">武汉</option>
        </select>
      </div>
      <div id="tipText" class="status">先选城市，再点开始录制</div>
      <button class="btn btn-primary" id="startBtn">开始录制取证</button>
    </div>

    <div id="ctrlSection" class="hidden">
      <div id="lawTip" class="status"></div>
      <button class="btn btn-success" id="saveBtn">结束并保存视频</button>
    </div>
  </div>

  <script>
    const localLaws = {
      "全国": { law: "《公共场所卫生管理条例实施细则》", tip: "室内公共场所全面禁烟，请立即熄灭香烟。" },
      "北京": { law: "《北京市控制吸烟条例》", tip: "本市室内公共场所全面禁烟，请立即熄灭香烟。" },
      "上海": { law: "《上海市公共场所控制吸烟条例》", tip: "本市室内全面禁烟，请配合熄灭香烟。" },
      "广州": { law: "《广州市控制吸烟条例》", tip: "室内禁止吸烟，请马上把烟灭掉。" },
      "深圳": { law: "《深圳经济特区控制吸烟条例》", tip: "全城室内禁烟，麻烦立即停止吸烟。" },
      "杭州": { law: "《杭州市公共场所控制吸烟条例》", tip: "室内公共场所禁止吸烟，请配合熄灭香烟。" },
      "成都": { law: "《成都市公共场所控制吸烟条例》", tip: "公共区域禁止吸烟，请立即灭烟。" },
      "武汉": { law: "《武汉市控制吸烟条例》", tip: "室内全程禁烟，请马上熄灭香烟。" }
    };

    let stream = null;
    let mediaRecorder = null;
    let chunks = [];
    let nowLaw = "";

    const preview = document.getElementById('preview');
    const startBtn = document.getElementById('startBtn');
    const saveBtn = document.getElementById('saveBtn');
    const citySelect = document.getElementById('citySelect');
    const startSection = document.getElementById('startSection');
    const ctrlSection = document.getElementById('ctrlSection');
    const lawTip = document.getElementById('lawTip');
    const recIndicator = document.getElementById('recIndicator');

    // 语音播报
    function speak(txt) {
      const u = new SpeechSynthesisUtterance(txt);
      u.lang = 'zh-CN';
      u.rate = 0.9;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }

    // 启动摄像头
    async function openCam() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: true
        });
        preview.srcObject = stream;
        return true;
      } catch (e) {
        alert("无法调取摄像头，请给浏览器开启相机、麦克风权限");
        return false;
      }
    }

    // 开始录像
    function startRec() {
      chunks = [];
      let opt = { mimeType: 'video/webm' };
      try {
        mediaRecorder = new MediaRecorder(stream, opt);
      } catch (e) {
        mediaRecorder = new MediaRecorder(stream);
      }
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) chunks.push(e.data);
      };
      mediaRecorder.start();
      recIndicator.classList.remove('hidden');
    }

    // 停止并强制下载（修复不保存的bug）
    function stopRecAndSave() {
      return new Promise(resolve => {
        mediaRecorder.onstop = () => {
          recIndicator.classList.add('hidden');
          const blob = new Blob(chunks, { type: "video/webm" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `禁烟取证_${new Date().toLocaleDateString()}.webm`;
          document.body.appendChild(a);
          a.click();
          // 兼容手机强制触发
          setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          }, 500);
          resolve();
        };
        mediaRecorder.stop();
        // 关闭摄像头
        if (stream) stream.getTracks().forEach(t => t.stop());
      });
    }

    // 开始按钮
    startBtn.addEventListener('click', async () => {
      const city = citySelect.value;
      if (!city) {
        alert("请先选择城市");
        return;
      }
      const lawInfo = localLaws[city];
      nowLaw = lawInfo.law;
      lawTip.innerText = `依据${nowLaw}：${lawInfo.tip}`;

      const camOk = await openCam();
      if (!camOk) return;

      startRec();
      speak(`现在依据${nowLaw}进行劝阻，此处属于禁烟区域，请立即熄灭香烟，否则将录像取证并举报。`);

      startSection.classList.add('hidden');
      ctrlSection.classList.remove('hidden');
    });

    // 结束保存按钮
    saveBtn.addEventListener('click', async () => {
      await stopRecAndSave();
      alert("录像已自动下载保存，请查看手机文件/相册");
      // 重置界面
      startSection.classList.remove('hidden');
      ctrlSection.classList.add('hidden');
      preview.srcObject = null;
    });
  </script>
</body>
</html>
